name: Elixir Tests

on:
  push:
    branches: [master]
  pull_request:
    branches: [master, feat/v6]

concurrency:
  group: elixir-test-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.filter.outputs.elixir }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            elixir:
              - 'elixir/**'
              - 'src/commands/**'
              - 'src/postgres/**'
              - '.github/workflows/elixir-test.yml'

  test:
    needs: changes
    runs-on: ubuntu-latest

    name: testing elixir@${{ matrix.elixir-version }}, otp@${{ matrix.otp-version }}, redis@${{ matrix.redis-version }}

    strategy:
      matrix:
        node-version: [lts/*]
        elixir-version: ['1.17']
        otp-version: ['27.x']
        redis-version: [7-alpine]

    steps:
      - name: Skip when Elixir files are unchanged
        if: needs.changes.outputs.should_run != 'true'
        run: echo "No Elixir-related changes detected; skipping Elixir test steps."

      - name: Checkout repository
        if: needs.changes.outputs.should_run == 'true'
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Use Node.js ${{ matrix.node-version }}
        if: needs.changes.outputs.should_run == 'true'
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'yarn'

      - name: Start Redis
        if: needs.changes.outputs.should_run == 'true'
        uses: supercharge/redis-github-action@bc274cb7238cd63a45029db04ee48c07a72609fd # 1.8.1
        with:
          redis-version: ${{ matrix.redis-version }}

      - if: needs.changes.outputs.should_run == 'true'
        run: yarn install --ignore-engines --frozen-lockfile --non-interactive
      - if: needs.changes.outputs.should_run == 'true'
        run: yarn generate:raw:scripts
      - if: needs.changes.outputs.should_run == 'true'
        run: yarn copy:lua:elixir

      - name: Set up Elixir
        if: needs.changes.outputs.should_run == 'true'
        uses: erlef/setup-beam@v1
        with:
          elixir-version: ${{ matrix.elixir-version }}
          otp-version: ${{ matrix.otp-version }}

      - name: Restore dependencies cache
        if: needs.changes.outputs.should_run == 'true'
        uses: actions/cache@v5
        with:
          path: elixir/deps
          key: ${{ runner.os }}-mix-deps-${{ matrix.elixir-version }}-${{ matrix.otp-version }}-${{ hashFiles('elixir/mix.lock') }}
          restore-keys: |
            ${{ runner.os }}-mix-deps-${{ matrix.elixir-version }}-${{ matrix.otp-version }}-

      - name: Install Elixir dependencies
        if: needs.changes.outputs.should_run == 'true'
        working-directory: elixir
        run: |
          mix local.hex --force
          mix local.rebar --force
          mix deps.get

      - name: Compile
        if: needs.changes.outputs.should_run == 'true'
        working-directory: elixir
        run: mix compile --warnings-as-errors

      - name: Run tests
        if: needs.changes.outputs.should_run == 'true'
        working-directory: elixir
        run: mix test --include integration

      - name: Check formatting
        if: needs.changes.outputs.should_run == 'true'
        working-directory: elixir
        run: mix format --check-formatted

  postgres-test:
    needs: changes
    if: needs.changes.outputs.should_run == 'true'
    runs-on: ubuntu-latest

    name: testing elixir postgres backend elixir@${{ matrix.elixir-version }}, otp@${{ matrix.otp-version }}, postgres@${{ matrix.postgres-version }}

    strategy:
      matrix:
        elixir-version: ['1.17']
        otp-version: ['27.x']
        postgres-version: ['16']

    services:
      postgres:
        image: postgres:${{ matrix.postgres-version }}
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: bullmq_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Elixir
        uses: erlef/setup-beam@v1
        with:
          elixir-version: ${{ matrix.elixir-version }}
          otp-version: ${{ matrix.otp-version }}

      - name: Restore dependencies cache
        uses: actions/cache@v5
        with:
          path: elixir/deps
          key: ${{ runner.os }}-mix-deps-${{ matrix.elixir-version }}-${{ matrix.otp-version }}-${{ hashFiles('elixir/mix.lock') }}
          restore-keys: |
            ${{ runner.os }}-mix-deps-${{ matrix.elixir-version }}-${{ matrix.otp-version }}-

      - name: Install Elixir dependencies
        working-directory: elixir
        run: |
          mix local.hex --force
          mix local.rebar --force
          mix deps.get

      - name: Compile
        working-directory: elixir
        run: mix compile --warnings-as-errors

      - name: Run Postgres backend tests
        working-directory: elixir
        env:
          POSTGRES_URL: postgres://postgres:postgres@localhost:5432/bullmq_test
        run: mix test test/bullmq/backends/postgres_test.exs test/bullmq/backends/postgres_integration_test.exs --include postgres
